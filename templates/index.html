<!doctype html>
<html>
  <head>
    <title>PostgreSQL Explorer</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.css">
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/sql/sql.js"></script>
    <style>
      
      body {
        margin: 0;
        font-family:
          Segoe UI,
          sans-serif;
        background: #111;
        color: white;
        overflow-y: hidden;
      }

      /* ===============================================
         ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ SIDEBAR ~ ~ ~ ~ ~ ~ ~ ~ ~ ~
         =============================================== */

      .sidebar {
          position: fixed;
          top: 60px;
          left: 0;

          width: 280px;
          height: calc(100vh - 60px);

          background: #222;
          border-right: 2px solid #ffffff20;

          display: flex;
          flex-direction: column;

          overflow: hidden;
      }

      .sb-button {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;

          height: 34px;
          padding: 0 14px;

          border: 1px solid rgba(255,255,255,.12);
          border-radius: 8px;

          background: rgba(255,255,255,.06);
          color: #e5e7eb;

          font-size: .82rem;
          font-weight: 500;

          cursor: pointer;
          user-select: none;

          transition:
              background .18s ease,
              border-color .18s ease,
              transform .08s ease,
              box-shadow .18s ease;
      }

      .sb-button:hover {
          background: rgba(255,255,255,.10);
          border-color: rgba(255,255,255,.20);
          box-shadow: 0 2px 8px rgba(0,0,0,.18);
      }

      .tree-area {
          height: calc(calc(100vh - 60px) - 40px);
          overflow-y: auto;

          scrollbar-width: thin;
          scrollbar-color: #4a4a4a transparent;
      }

      .tree-area::-webkit-scrollbar {
          width: 4px;
      }

      .tree-area::-webkit-scrollbar-track {
          background: transparent;
      }

      .tree-area::-webkit-scrollbar-thumb {
          background: #4a4a4a;
          border-radius: 999px;
      }

      .tree-area::-webkit-scrollbar-thumb:hover {
          background: #666;
      }

      .dta {
        margin: 0;
        font-size: 0.6rem;
      }


      .app-header {
          position: fixed;
          top: 0;
          left: 0;

          width: 100%;
          height: 40px;

          z-index: 999999;

          overflow: visible;

          background: radial-gradient(circle at top left, #291212, #000);
          padding: 10px 22px;
          border-bottom: 1px solid #2f2f2f;
      }

      .brand {
          display: flex;
          align-items: center;
          gap: 14px;
          margin-top: -10px;
      }

      .brand i {
          font-size: 1.7rem;
          color: #ff0062;
      }

      .brand h1 {
          margin: 0;
          font-size: 1.8rem;
          font-weight: 700;
          color: #fff;
          letter-spacing: -0.04em;
      }

      .brand p {
        margin: 0;
        margin-top: -3px;
        font-size: 0.75rem;
        color: #8d8d8d;
        font-weight: 300;
        font-family: 'Manrope', sans-serif;
        letter-spacing: 0.02rem;
      }


      .content {
        justify-content: center;
        justify-items: center;
        margin-left: 280px;
        margin-top: 60px;
        width: calc(100vw - 280px);
        min-height: calc(100vh - 250px);
        max-height: calc(100vh - 250px);

        background-color: white;

        background-image: radial-gradient(#00000022 1px, transparent 1px);
        background-size: 20px 20px;
        color: black;
        overflow-y: auto;
        overflow-x: hidden;
        box-sizing: border-box;

        scrollbar-width: thin;
        scrollbar-color: #4a4a4a transparent;
      }

      .CodeMirror {
          height: 140px !important;   /* or whatever you want */
          font-size: 14px;
          border: 1px solid #0000002d;
          border-radius: 12px;
          padding: 10px;
      }


      .CodeMirror-focused {border: 1px solid #00000073;}

      .tree,
      .tree ul {
        list-style: none;
        margin: 0;
        padding-left: 20px;
      }

      .tree li {
        position: relative;
        padding: 2px 0 2px 8px;
      }

      /* Vertical line */
      .tree li::before {
        content: "";
        position: absolute;
        left: 8px;
        top: -6px;
        bottom: -6px;
        width: 1px;
        background: #444;
      }

      /* Horizontal connector */
      .tree li::after {
        content: "";
        position: absolute;
        left: 8px;
        top: 16px;
        width: 12px;
        height: 1px;
        background: #444;
      }

      /* Remove the vertical line after the last child */
      .tree li:last-child::before {
        bottom: 11px;
      }

      .item {
        border-radius: 6px;
        display: inline-block;
        margin-left: 10px;
        padding: 2px 10px;
        cursor: pointer;
      }
      .item i {
        font-size: 0.9rem;
        margin-left: 10px;
        color: #ffffff59;
      }

      .item:hover {
        background: #ffffff12;
      }

      .alpha-table {
        margin-top: 38px;
        background: white;
        border: 1px solid #e3e8f0;
        box-shadow: 0 8px 24px rgba(20, 30, 60, 0.06);
        border-radius: 14px;
        border-collapse: separate;
        border-spacing: 0;
        min-width: 700px;
        margin-bottom: 60px;
        font-size: 0.85rem;
      }

      .alpha-table tr,
      .alpha-table td {
        border: none;
        border-bottom: 1px solid #e3e8f0;
      }

      .alpha-table tr:last-child td { border-bottom: none; }

      .alpha-table th:first-child { border-top-left-radius: 12px; }
      .alpha-table th:last-child  { border-top-right-radius: 12px; }

      .alpha-table tr:first-child {background: linear-gradient(to left, #550f0f, #291212);}

      .alpha-table th {
        background: none;
        color: #dbe4f7;
        font-family: monospace;
        font-weight: 500;
        font-size: 0.72rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        padding: 12px 18px;
        border: none;
        text-align: left;
      }

      .alpha-table td {
        padding: 10px 18px;
        font-family: monospace;
        color: #2a3350;
      }

      .alpha-table tr {
        text-align: left;
        transition: background .1s ease;
      }

      .children {
        max-height: 1000px;
        overflow: hidden;
        transition: max-height 0.1s ease;
      }

      .children.hidden {
        max-height: 0;
      }

      .arrow {
        display: inline-block;
        transition: transform 0.2s ease;
      }

      /* Expanded */
      .arrow {
        transform: rotate(0deg);
      }

      /* Collapsed */
      .arrow.closed {
        transform: rotate(-90deg);
      }

      .table-footer {
        position: fixed;
        bottom: 0;
        left: 282px;
        color: #222;
        display: flex;
        height: 40%;
        display: flex;
        flex-direction: column;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        background-color: white;
        box-shadow: 0px 0px 12px #2222229f;
        width: calc(100vw - 280px);
        transition:
            transform 0.35s cubic-bezier(.25,.8,.25,1),
            box-shadow 0.35s ease;

      }

      .table-footer.hidden {
          transform: translateY(calc(100% - 20px));
          box-shadow: 0 -2px 8px rgba(0,0,0,.15);
      }

      .toggle {
          width: 40px;
          height: 18px;
          border: 1px solid #00000036;
          border-radius: 20px;
          transform: translateY(-12px);
      }

      .arrow {
          display: inline-block;
          transition: transform .35s ease;
      }

      .table-footer.hidden .arrow {
          transform: rotate(180deg);
      }

      .query-bar {
        margin-left: 20px;
        margin-top: 20px;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }

      .query-box {
        width: 350px;
        height: 180px;

        box-sizing: border-box;

        padding: 15px;

        resize: none;
        outline: none;

        border: 1px solid #00000034;
        border-radius: 8px;

        background: #fafafa;

        font-family: Consolas, monospace;
        font-size: 15px;
        line-height: 1.6;

        white-space: pre-wrap;
        overflow-wrap: break-word;
      }

      .output-box {
        padding: 10px;
        font-family: 'Courier New', Courier, monospace;
        outline: none;
        margin-right: 20px;
        margin-top: 20px;
        margin-bottom: 20px;
        width: 100%;
        height: 83%;

        border-radius: 12px;
        border: 1px solid #00000028;
        box-sizing: border-box;
      }

      .query-box:focus {
        border-color: #000000b6;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.15);
      }

      .query-bar button {
        padding: 10px 18px;
        width: 350px;
        border: none;
        border-radius: 8px;

        background: #0078d4;
        color: white;

        cursor: pointer;

        font-weight: 600;
      }

      .query-bar button:hover {
        background: #0064b5;
      }

      .table-head {
          background: #f4f6fa;
          padding-left: 20px;
          padding-top: 10px;
          padding-bottom: 10px;
          width: calc(100vw - 280px);
          height: fit-content;
          color: #22222270;

          display: flex;
          align-items: center;
          justify-content: space-between;
      }


.column {
    position: relative;
}

.tooltip {
    position: absolute;
    top: 110%;
    left: 50%;
    transform: translate(-50%, -210%);

    background: #222;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-weight: 200;
    white-space: nowrap;

    opacity: 0;
    pointer-events: none;
    transition: opacity .15s;

    z-index: 999999;
}

.column:hover .tooltip {
    opacity: 1;
} 
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-mono);
        font-size: 0.82rem;
        margin-left: 20px;
      }

      .crumb-label {
        color: #94a1bb;
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-family: var(--font-ui);
        font-weight: 700;
      }

      .crumb-value {
        color: #1a2233;
        font-weight: 600;
        background: #ffffff;
        border: 1px solid #e3e8f0;
        padding: 3px 10px;
        border-radius: 999px;
      }
    </style>
    <script src="/static/script.js"></script>
  </head>
  <body>
    <header class="app-header">
          <div class="brand">
              <i class="bi bi-database-fill"></i>

              <div>
                  <h1>OneDB</h1>
                  <p>Manage all your databases from one place.</p>
              </div>
          </div>
      </header>
    <div class="sidebar">
      <div class="tree-area">
        <ul class="tree" style="margin-left: -20px"></ul>
      </div>
      <footer
        style="
          position: fixed;
          bottom: 0;
          left: 0;
          width: 280px;
          background: #222;
          border-top: 1px solid #444;
          padding: 10px 20px;
          box-sizing: border-box;
          display: flex;
          gap: 25px;
          font-size: 0.7rem;
          color: #ffffff69;
        "
      >
        <span>Databases - <i class="bi bi-database"></i></span>
        <span>Tables - <i class="bi bi-table"></i></span>
        <span>Schemes - <i class="bi bi-map"></i></span>
      </footer>
    </div>

    <div class="content" id="content">
      <header class="table-head">

        <div class="breadcrumb">
          <span class="crumb-label">db</span>
          <span id="selected" class="crumb-value">nil</span>
          <i class="bi bi-chevron-right crumb-sep"></i>
          <span class="crumb-label">table</span>
          <span id="selected-table" class="crumb-value">nil</span>
        </div>

        <div class="breadcrumb" style="margin-right: 40px;">
          <div class="crumb-value" > <span style="color: #94a1bb; margin-right: 5px;">rows</span> <span id="rows">nil</span></div>
          <div class="crumb-value"><span style="color: #94a1bb; margin-right: 5px;">columns</span> <span id="columns">nil</span></div>
        </div>
      </header>

      <div id="table"></div>

      <footer class="table-footer" id="table-footer">
        <div
          style="
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px 0;
          "
        >
          <button id="toggle" class="toggle">
              <span class="arrow">▼</span>
          </button>
        </div>
        <div
          style="
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            margin-top: -20px;
          "
        >
          <div class="query-bar">
            <textarea
              class="query-box"
              id="query"
              placeholder="SELECT * FROM users;"
            ></textarea>
            <button id="run" onclick="runQuery()">▶ Run</button>
          </div>
          <textarea class="output-box" disabled="True" placeholder="Output will appear here"></textarea>
        </div>
      </footer>
    </div>
    <script>
      let currentDatabase = "";
      let currentScheme = "";
      let currentTable = "";
      
      function renderTable(data) {
          const tableDiv = document.getElementById("table");

          let html = "<table class='alpha-table'>";

          // Header
          html += "<tr>";
          for (const col of data.columns) {
              html += `<th class="column">${col[0]}
                <span class="tooltip">
                Type: ${col[1]}<br>
                </span>
              </th>`;
          }
          html += "</tr>";

          // Rows
          if (!data.rows || data.rows.length === 0) {
              html += "<tr>";
              html += `<td colspan="${data.columns.length}" style="padding:20px;">No rows found</td>`;
              html += "</tr>";
          } else {
              for (const row of data.rows) {
                  html += "<tr>";

                  if (Array.isArray(row)) {
                      // PostgreSQL returns arrays
                      for (const value of row) {
                          html += `<td>${value ?? "NULL"}</td>`;
                      }
                  } else {
                      // MySQL / SQLite / dicts
                      for (const col of data.columns) {
                          html += `<td>${row[col] ?? "NULL"}</td>`;
                      }
                  }

                  html += "</tr>";
              }
          }

          html += "</table>";

          tableDiv.innerHTML = html;
      }

      const editor = CodeMirror.fromTextArea(document.getElementById("query"), {
      mode: "text/x-pgsql",
      theme: "default",
      lineNumbers: false,
      indentWithTabs: true,
      smartIndent: true,
      matchBrackets: true,
    });

      document.querySelector(".tree").addEventListener("click", async (e) => {
          const table = e.target.closest(".table");
          if (!table) return;

          currentDatabase = table.dataset.db;
          currentTable = table.dataset.table;
          currentScheme = table.dataset.schema;

          document.getElementById("selected").innerText = currentDatabase;
          document.getElementById("selected-table").innerText = currentTable;

          const res = await fetch(
              `/api/table/${currentDatabase}/${currentScheme}/${currentTable}`
          );

          const data = await res.json();

          document.getElementById("rows").innerText =
              data.rows ? data.rows.length : 0;
          document.getElementById("columns").innerText =
              data.columns.length;

          renderTable(data);
      });

      async function refreshTree() {
        const req = await fetch("/api/tree");
        const tree = await req.json();

        renderTree(tree);
        attachFolderListeners();
        attachTableListeners();
      }

      async function runQuery() {
        const query = editor.getValue();

        const res = await fetch("/api/query", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            database: currentDatabase,
            query: query,
          }),
        });

        const data = await res.json();

        if (!data.success) {
          document.querySelector(".output-box").value = "[ERROR] " + data.error;

          return;
        }

        if (data.type === "result") {
            setTimeout(refreshTree, 1000);
            renderTable(data);

            let output = `[SUCCESS] ${data.rowcount} row(s) returned\n`;
            output += "================ RESULTS ================\n\n";

            data.rows.forEach((row, i) => {
                output += `Row ${i + 1}\n`;

                row.forEach((value, j) => {
                    output += `  ${data.columns[j]}: ${value}\n`;
                });

                output += "\n----------------------------------------\n\n";
            });
            
            document.querySelector(".output-box").value = output;
        } else {
            document.querySelector(".output-box").value =
                `[SUCCESS] ${data.message}\nAffected rows: ${data.affected_rows}`;
        }

      }

      const footer = document.getElementById("table-footer");
      const toggle = document.getElementById("toggle");
      const content = document.getElementById("content");
      const table = document.getElementById("table");

      toggle.onclick = () => {
          footer.classList.toggle("hidden");
          if (footer.classList.contains("hidden")) {
              content.style.minHeight = "100vh";
              content.style.maxHeight = "100vh";
              table.style.marginBottom = "140px";
          } else {
            setTimeout(() => {
              content.style.maxHeight = "calc(100vh - 250px)"; 
              content.style.minHeight = "calc(100vh - 250px)";
            }, 300)

          }
      };
    </script>
  </body>
</html>
