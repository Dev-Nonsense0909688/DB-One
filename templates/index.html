<!doctype html>
<html>
  <head>
    <title>PostgreSQL Explorer</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        margin: 0;
        font-family:
          Segoe UI,
          sans-serif;
        background: #111;
        color: white;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 280px;
        height: 100vh;

        background: #222;
        border-right: 2px solid #ffffff20;

        overflow-y: auto;
        padding: 0;
        box-sizing: border-box;
      }

      .tree-area {
        min-height: calc(100vh - 36px);
        max-height: calc(100vh - 36px);
        overflow-y: auto;
      }

      .sidebar::-webkit-scrollbar {
          width: 8px;
      }

      .sidebar::-webkit-scrollbar-track {
          background: transparent;
      }

      .sidebar::-webkit-scrollbar-thumb {
          background: #4a4a4a;
          border-radius: 999px;
      }

      .sidebar::-webkit-scrollbar-thumb:hover {
          background: #666;
      }

      /* Firefox */
      .sidebar {
          scrollbar-width: thin;
          scrollbar-color: #4a4a4a transparent;
      }

      .app-header {
          background: radial-gradient(circle at top left, #291212, #000);
          padding: 10px 22px;
          border-bottom: 1px solid #2f2f2f;
          margin-bottom: 5px;
      }

      .brand {
          display: flex;
          align-items: center;
          gap: 14px;
      }

      .brand i {
          font-size: 1.7rem;
          color: #ff0062;
      }

      .brand h1 {
          margin: 0;
          font-size: 1.8rem;
          font-weight: 700;
          color: #fff;
          letter-spacing: -0.04em;
      }

      .brand p {
        margin: 0;
        margin-top: -4px;
          font-size: 0.7rem;
          color: #8d8d8d;
          font-weight: 400;
      }


      .content {
        justify-content: center;
        justify-items: center;
        margin-left: 280px;
        width: calc(100vw - 280px);
        min-height: calc(100vh - 250px);
        max-height: calc(100vh - 250px);

        background-color: white;

        background-image: radial-gradient(#00000022 1px, transparent 1px);
        background-size: 20px 20px;
        color: black;
        overflow-y: auto;
        overflow-x: hidden;
        box-sizing: border-box;
      }

      .tree,
      .tree ul {
        list-style: none;
        margin: 0;
        padding-left: 20px;
      }

      .tree li {
        position: relative;
        padding: 2px 0 2px 8px;
      }

      /* Vertical line */
      .tree li::before {
        content: "";
        position: absolute;
        left: 8px;
        top: -6px;
        bottom: -6px;
        width: 1px;
        background: #444;
      }

      /* Horizontal connector */
      .tree li::after {
        content: "";
        position: absolute;
        left: 8px;
        top: 16px;
        width: 12px;
        height: 1px;
        background: #444;
      }

      /* Remove the vertical line after the last child */
      .tree li:last-child::before {
        background: linear-gradient(to bottom, #444 0%, #222 100%);
        bottom: 16px;
      }

      .item {
        border-radius: 6px;
        display: inline-block;
        margin-left: 10px;
        padding: 2px 10px;
        cursor: pointer;
      }
      .item i {
        font-size: 0.9rem;
        margin-left: 10px;
        color: #ffffff59;
      }

      .item:hover {
        background: #ffffff12;
      }

      .alpha-table {
        margin-top: 60px;
        background: white;
        box-shadow: 0px 0px 12px #22222248;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        min-width: 700px;
        margin-bottom: 30px;
      }

      .alpha-table tr,
      td {
        border: 1px solid #222;
      }

      .alpha-table th:first-child {
        border-top-left-radius: 12px;
      }

      .alpha-table th:last-child {
        border-top-right-radius: 12px;
      }

      .alpha-table th {
        background-color: beige;
        padding: 12px 15px;
        border: 1px solid #222;
      }

      .alpha-table tr {
        text-align: center;
      }

      .children {
        max-height: 1000px;
        overflow: hidden;
        transition: max-height 0.1s ease;
      }

      .children.hidden {
        max-height: 0;
      }

      .arrow {
        display: inline-block;
        transition: transform 0.2s ease;
      }

      /* Expanded */
      .arrow {
        transform: rotate(0deg);
      }

      /* Collapsed */
      .arrow.closed {
        transform: rotate(-90deg);
      }

      .table-footer {
        position: fixed;
        bottom: 0;
        left: 280px;
        color: #222;
        display: flex;
        height: 40%;
        display: flex;
        flex-direction: column;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        background-color: white;
        box-shadow: 0px 0px 12px #2222229f;
        width: calc(100vw - 280px);
        transition:
            transform 0.35s cubic-bezier(.25,.8,.25,1),
            box-shadow 0.35s ease;

      }

      .table-footer.hidden {
          transform: translateY(calc(100% - 38px));
          box-shadow: 0 -2px 8px rgba(0,0,0,.15);
      }

      .toggle {
          width: 40px;
          height: 18px;
          transform: translateY(-12px);
      }

      .arrow {
          display: inline-block;
          transition: transform .35s ease;
      }

      .table-footer.hidden .arrow {
          transform: rotate(180deg);
      }

      .query-bar {
        margin-left: 20px;
        margin-top: 20px;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }

      .query-box {
        width: 350px;
        height: 180px;

        box-sizing: border-box;

        padding: 15px;

        resize: none;
        outline: none;

        border: 1px solid #0000005d;
        border-radius: 8px;

        background: #fafafa;

        font-family: Consolas, monospace;
        font-size: 15px;
        line-height: 1.6;

        white-space: pre-wrap;
        overflow-wrap: break-word;
      }

      .output-box {
        outline: none;
        margin-right: 20px;
        margin-top: 20px;
        margin-bottom: 20px;
        width: 100%;
        height: 83%;

        border-radius: 12px;
        border: 1px solid #0000006b;
        box-sizing: border-box;
      }

      .query-box:focus {
        border-color: #000000b6;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.15);
      }

      .query-bar button {
        padding: 10px 18px;
        width: 350px;
        border: none;
        border-radius: 8px;

        background: #0078d4;
        color: white;

        cursor: pointer;

        font-weight: 600;
      }

      .query-bar button:hover {
        background: #0064b5;
      }

      .table-head {
    background: none;
    margin-left: 20px;
    width: calc(100vw - 280px);
    height: fit-content;
    color: #22222270;

    display: flex;
    align-items: center;
    justify-content: space-between;
}
    </style>
    <script src="/static/script.js"></script>
  </head>
  <body>
    <div class="sidebar">
      <header class="app-header">
          <div class="brand">
              <i class="bi bi-database-fill"></i>

              <div>
                  <h1>OneDB</h1>
                  <p>Manage all your databases from one place.</p>
              </div>
          </div>
      </header>
      <div class="tree-area">
        <ul class="tree" style="margin-left: -20px">
        </ul>
      </div>
      <footer
        style="
          position: fixed;
          bottom: 0;
          left: 0;
          width: 280px;
          background: #222;
          border-top: 1px solid #444;
          padding: 10px 20px;
          box-sizing: border-box;
          display: flex;
          gap: 25px;
          font-size: 0.7rem;
          color: #ffffff69;
        "
      >
        <span>Databases - <i class="bi bi-database"></i></span>
        <span>Tables - <i class="bi bi-table"></i></span>
        <span>Schemes - <i class="bi bi-map"></i></span>
      </footer>
    </div>

    <div class="content" id="content">
      <header class="table-head">
        <div style="display: flex; flex-direction: row; gap: 20px;">
        <span style="display: flex; flex-direction: row; gap: 10px"
          ><p style="font-size: 0.8rem">currentDB:</p>
          <p id="selected" style="font-size: 0.8rem">nil</p></span
        >
        <span style="display: flex; flex-direction: row; gap: 10px"
          ><p style="font-size: 0.8rem">current-table:</p>
          <p id="selected-table" style="font-size: 0.8rem">nil</p></span
        >
        </div>
        <div style="display: flex; flex-direction: row; gap: 20px;">
          <span style="display: flex; flex-direction: row; gap: 10px"
          ><p style="font-size: 0.8rem">Rows:</p>
          <p id="rows" style="font-size: 0.8rem">nil</p></span
        >
        <span style="display: flex; flex-direction: row; gap: 10px; margin-right: 20px;"
          ><p style="font-size: 0.8rem">Columns:</p>
          <p id="columns" style="font-size: 0.8rem">nil</p></span
        >
        </div>
      </header>

      <div id="table"></div>

      <footer class="table-footer" id="table-footer">
        <div
          style="
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px 0;
          "
        >
          <button id="toggle" class="toggle">
              <span class="arrow">▼</span>
          </button>
        </div>
        <div
          style="
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            margin-top: -20px;
          "
        >
          <div class="query-bar">
            <textarea
              class="query-box"
              id="query"
              placeholder="SELECT * FROM users;"
            ></textarea>
            <button id="run" onclick="runQuery()">▶ Run</button>
          </div>
          <textarea class="output-box" disabled="True"></textarea>
        </div>
      </footer>
    </div>
    <script>
      let currentDatabase = "";
      let currentScheme = "";
      let currentTable = "";

      document.querySelector(".tree").addEventListener("click", async (e) => {
          const table = e.target.closest(".table");
          if (!table) return;

          currentDatabase = table.dataset.db;
          currentTable = table.dataset.table;
          currentScheme = table.dataset.schema;

          document.getElementById("selected").innerText = currentDatabase;
          document.getElementById("selected-table").innerText = currentTable;

          const res = await fetch(
              `/api/table/${currentDatabase}/${currentScheme}/${currentTable}`
          );

          const data = await res.json();

          document.getElementById("rows").innerText =
              data.rows ? data.rows.length : 0;
          document.getElementById("columns").innerText =
              data.columns.length;

          renderTable(data);
      });

      async function runQuery() {
        const query = document.getElementById("query").value;

        const res = await fetch("/api/query", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            database: currentDatabase,
            query: query,
          }),
        });

        const data = await res.json();

        if (!data.success) {
          document.querySelector(".output-box").value = "[ERROR] " + data.error;

          return;
        }

        if (data.rows) {
          renderTable(data);

          document.querySelector(".output-box").value =
            `${data.rows.length} row(s) returned`;
        } else {
          document.querySelector(".output-box").value = "[SUCCESS] " + data.message;
        }

        window.location.reload();
      }

      const footer = document.getElementById("table-footer");
      const toggle = document.getElementById("toggle");
      const content = document.getElementById("content");


      toggle.onclick = () => {
          footer.classList.toggle("hidden");
          if (footer.classList.contains("hidden")) {
              content.style.minHeight = "100vh";
              content.style.maxHeight = "100vh";

          } else {
            setTimeout(() => {
              content.style.maxHeight = "calc(100vh - 250px)"; 
              content.style.minHeight = "calc(100vh - 250px)";
            }, 300)

          }
      };
    </script>
  </body>
</html>
